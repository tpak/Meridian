name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCHEME: Meridian
  PROJECT: Meridian/Meridian.xcodeproj
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"
  CODE_SIGN_IDENTITY: ""
  NSUnbufferedIO: "YES"

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: macos-15
    env:
      TZ: America/Chicago
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Meridian/Meridian.xcodeproj/project.pbxproj', 'Meridian/CoreLoggerKit/Package.swift', 'Meridian/CoreModelKit/Package.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint

      - name: Build & Analyze
        run: |
          set -o pipefail
          xcodebuild -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            build analyze \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY= \
            | xcpretty

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    needs: build-and-lint
    env:
      TZ: America/Chicago
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('Meridian/Meridian.xcodeproj/project.pbxproj', 'Meridian/CoreLoggerKit/Package.swift', 'Meridian/CoreModelKit/Package.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            test \
            -only-testing:MeridianUnitTests \
            -disable-concurrent-destination-testing \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY= \
            -resultBundlePath TestResults/unit-tests.xcresult \
            | xcpretty

      - name: Test Results Summary
        # NOTE: xcresulttool is unmaintained (still Node 16). No drop-in replacement exists.
        # Remove this step if it stops working after GitHub drops Node 20 (Sept 2026).
        if: always()
        continue-on-error: true
        uses: kishikawakatsumi/xcresulttool@v1
        with:
          path: TestResults/unit-tests.xcresult
          show-passed-tests: false
          show-code-coverage: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: TestResults/
